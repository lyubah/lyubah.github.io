<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Lubah Nelson | AI Research & Systems Portfolio</title>
    <meta
      name="description"
      content="Light, research-forward AI/ML portfolio for Lubah Nelson, focused on efficient inference, agentic systems, and elegant proof of work."
    />
    <meta
      name="theme-color"
      content="#f7f3ec"
    />
    <meta
      property="og:title"
      content="Lubah Nelson | AI Research & Systems Portfolio"
    />
    <meta
      property="og:description"
      content="A light, nature-meets-algorithms portfolio of research, public proof, and private AI systems work."
    />
    <meta
      property="og:type"
      content="website"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      const isLocalHost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";

      if (isLocalHost) {
        window.location.replace(
          `/index.source.html${window.location.search}${window.location.hash}`,
        );
      } else {
        const style = document.createElement("link");
        style.rel = "stylesheet";
        style.href = "/assets/app.css";
        document.head.appendChild(style);

        const script = document.createElement("script");
        script.type = "module";
        script.src = "/assets/app.js";
        document.head.appendChild(script);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
